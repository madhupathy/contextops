name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go API ─────────────────────────────────────────────────
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod download
      - run: go vet ./...
      - run: go build -o /dev/null .
      - run: go test ./... -v -race

  # ── Go CLI ─────────────────────────────────────────────────
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod download
      - run: go vet ./...
      - run: go build -o contextops .
      - name: Verify CLI starts
        run: ./contextops --help

  # ── Python Evaluator ───────────────────────────────────────
  evaluator:
    name: Evaluator (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/evaluator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Compile all modules
        run: |
          python -m py_compile main.py
          python -m py_compile models.py
          for f in evaluators/*.py; do
            python -m py_compile "$f"
            echo "OK: $f"
          done
      - name: Verify all 12 evaluators register
        run: |
          python -c "
          from evaluators.registry import EvaluatorRegistry
          r = EvaluatorRegistry()
          evals = r.list_evaluators()
          assert len(evals) == 17, f'Expected 15 evaluators, got {len(evals)}: {[e[\"category\"] for e in evals]}'
          print(f'OK: {len(evals)} evaluators registered')
          for e in evals:
              print(f'  - {e[\"category\"]}')
          "
      - name: Verify profile categories
        run: |
          python -c "
          from evaluators.registry import EvaluatorRegistry
          r = EvaluatorRegistry()
          for profile in ('rag', 'agent', 'memory', 'enterprise', 'production', 'autonomous', 'full'):
              cats = r.categories_for_intent(profile)
              assert len(cats) > 0, f'Profile {profile} has no categories'
              print(f'Profile {profile}: {cats}')
          "

  # ── Trace Schema Validation ────────────────────────────────
  schema:
    name: Trace Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate example traces
        run: |
          python -c "
          import json, jsonschema, glob
          schema = json.load(open('packages/trace-schema/schema.json'))
          for f in glob.glob('examples/traces/*.json'):
              trace = json.load(open(f))
              jsonschema.validate(trace, schema)
              print(f'VALID: {f}')
          "

  # ── Benchmark Cases Validation ─────────────────────────────
  benchmarks:
    name: Benchmark Cases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate benchmark case JSON
        run: |
          python -c "
          import json, glob, sys
          errors = []
          for f in glob.glob('benchmarks/**/cases/*.json', recursive=True):
              try:
                  case = json.load(open(f))
                  assert 'query' in case, f'{f}: missing query field'
                  assert 'pass_criteria' in case, f'{f}: missing pass_criteria'
                  print(f'VALID: {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          "

  # ── Docker Build ───────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t contextops/api:test apps/api/
      - name: Build Evaluator image
        run: docker build -t contextops/evaluator:test apps/evaluator/
      - name: Build CLI image
        run: docker build -t contextops/cli:test apps/cli/

  # ── Helm Lint ──────────────────────────────────────────────
  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/k8s/helm/contextops/

  # ── Gate Check (integration) ───────────────────────────────
  gate:
    name: Gate Check
    needs: [api, cli, evaluator]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build CLI
        run: cd apps/cli && go build -o ../../bin/contextops .
      - name: Validate traces
        run: |
          for f in examples/traces/*.json; do
            ./bin/contextops trace validate "$f"
          done
