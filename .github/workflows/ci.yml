name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go API ────────────────────────────────────────────
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod download
      - run: go vet ./...
      - run: go build -o /dev/null .
      - run: go test ./... -v -race

  # ── Go CLI ────────────────────────────────────────────
  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod download
      - run: go vet ./...
      - run: go build -o contextops .
      - name: Verify CLI help
        run: ./contextops --help

  # ── Python Evaluator ──────────────────────────────────
  evaluator:
    name: Evaluator (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/evaluator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py
      - run: python -m py_compile models.py
      - name: Compile all evaluators
        run: |
          for f in evaluators/*.py; do
            python -m py_compile "$f"
          done

  # ── Trace Schema Validation ───────────────────────────
  schema:
    name: Trace Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate example traces
        run: |
          python -c "
          import json, jsonschema, glob
          schema = json.load(open('packages/trace-schema/schema.json'))
          for f in glob.glob('examples/traces/*.json'):
              trace = json.load(open(f))
              jsonschema.validate(trace, schema)
              print(f'VALID: {f}')
          "

  # ── Docker Build ──────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t contextops/api:test apps/api/
      - name: Build Evaluator image
        run: docker build -t contextops/evaluator:test apps/evaluator/
      - name: Build CLI image
        run: docker build -t contextops/cli:test apps/cli/

  # ── Helm Lint ─────────────────────────────────────────
  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/k8s/helm/contextops/

  # ── Gate Check (integration) ──────────────────────────
  gate:
    name: Gate Check
    needs: [api, cli, evaluator]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build CLI
        run: cd apps/cli && go build -o ../../bin/contextops .
      - name: Validate traces
        run: |
          for f in examples/traces/*.json; do
            ./bin/contextops trace validate "$f"
          done
