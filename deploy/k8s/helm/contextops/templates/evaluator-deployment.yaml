apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contextops.fullname" . }}-evaluator
  labels:
    {{- include "contextops.labels" . | nindent 4 }}
    app.kubernetes.io/component: evaluator
spec:
  replicas: {{ .Values.evaluator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: evaluator
      {{- include "contextops.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: evaluator
        {{- include "contextops.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: evaluator
          image: "{{ .Values.evaluator.image.repository }}:{{ .Values.evaluator.image.tag }}"
          imagePullPolicy: {{ .Values.evaluator.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ include "contextops.databaseURL" . | quote }}
            - name: REDIS_URL
              value: {{ include "contextops.redisURL" . | quote }}
            {{- if .Values.evaluator.env.OPENAI_API_KEY }}
            - name: OPENAI_API_KEY
              value: {{ .Values.evaluator.env.OPENAI_API_KEY | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.evaluator.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "contextops.fullname" . }}-evaluator
  labels:
    {{- include "contextops.labels" . | nindent 4 }}
    app.kubernetes.io/component: evaluator
spec:
  type: {{ .Values.evaluator.service.type }}
  ports:
    - port: {{ .Values.evaluator.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: evaluator
    {{- include "contextops.selectorLabels" . | nindent 4 }}
